<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Purchase Decision Tool</title>
  <style>
    :root {
      --navy: #050816;
      --navy-2: #0b1024;
      --ink: #111827;
      --muted: #667085;
      --line: #d9e1ec;
      --soft: #f5f7fb;
      --card: #ffffff;
      --accent: #2563eb;
      --accent-soft: #eaf1ff;
      --success: #16a34a;
      --shadow: 0 22px 60px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 30%),
        linear-gradient(180deg, #f8fafc 0%, #eef3f9 100%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 22px 14px 40px;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: clamp(28px, 5vw, 52px);
      color: white;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.24), transparent 40%),
        linear-gradient(135deg, var(--navy), var(--navy-2));
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -120px;
      top: -120px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #93c5fd;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 780px;
      font-size: clamp(38px, 7vw, 74px);
      line-height: 0.92;
      letter-spacing: -0.065em;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 20px 0 0;
      font-size: 16px;
      line-height: 1.7;
      color: #dbeafe;
    }

    .app-card {
      margin-top: 22px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .progress-wrap {
      padding: 22px 24px 0;
    }

    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8eef7;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2563eb, #38bdf8);
      transition: width 0.25s ease;
    }

    .content {
      padding: clamp(24px, 4vw, 40px);
    }

    .step-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: -0.055em;
      color: #0f172a;
    }

    .step-subtitle {
      max-width: 680px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 28px;
    }

    .choice-grid.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .choice-card {
      min-height: 148px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 22px;
      text-align: left;
      background: white;
      color: var(--ink);
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.02);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .choice-card:hover {
      transform: translateY(-2px);
      border-color: #9db4d3;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    .choice-card.selected {
      border-color: var(--navy);
      background: var(--navy);
      color: white;
      box-shadow: 0 18px 38px rgba(2, 6, 23, 0.22);
    }

    .choice-emoji {
      font-size: 30px;
      line-height: 1;
      margin-bottom: 18px;
    }

    .choice-title {
      font-weight: 850;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .choice-desc {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .choice-card.selected .choice-desc {
      color: #cbd5e1;
    }

    .pill-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      color: #1f2937;
      background: white;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .pill:hover {
      transform: translateY(-1px);
      border-color: #9db4d3;
    }

    .pill.selected {
      border-color: var(--navy);
      background: var(--navy);
      color: white;
    }

    .input-wrap {
      margin-top: 28px;
    }

    .input-label {
      display: block;
      margin-bottom: 10px;
      color: #344054;
      font-size: 14px;
      font-weight: 800;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      color: var(--ink);
      background: white;
      outline: none;
      font-size: 16px;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 34px;
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      font-weight: 850;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .btn-primary {
      background: var(--navy);
      color: white;
      box-shadow: 0 12px 24px rgba(2, 6, 23, 0.18);
    }

    .btn-secondary {
      border: 1px solid var(--line);
      background: white;
      color: #344054;
    }

    .hint {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .result-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      margin-top: 30px;
    }

    .result-card {
      border-radius: var(--radius-xl);
      padding: 28px;
      color: white;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.28), transparent 44%),
        linear-gradient(135deg, var(--navy), var(--navy-2));
      box-shadow: var(--shadow-soft);
    }

    .result-label {
      color: #93c5fd;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .result-name {
      margin: 10px 0 8px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 0.95;
      letter-spacing: -0.065em;
    }

    .confidence {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      color: #dbeafe;
      font-size: 13px;
      font-weight: 800;
    }

    .result-copy {
      margin: 18px 0 0;
      color: #dbeafe;
      font-size: 15px;
      line-height: 1.7;
    }

    .result-section {
      margin-top: 24px;
    }

    .result-section-title {
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 850;
      color: white;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin: 8px 0;
      color: #dbeafe;
      font-size: 14px;
      line-height: 1.45;
    }

    .support-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 24px;
      background: white;
    }

    .support-title {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .compare-box {
      margin-top: 14px;
      border-radius: var(--radius-lg);
      padding: 18px;
      background: var(--soft);
    }

    .compare-name {
      font-weight: 900;
      font-size: 17px;
    }

    .compare-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .compare-copy {
      margin: 12px 0 0;
      color: #475467;
      font-size: 14px;
      line-height: 1.58;
    }

    textarea {
      width: 100%;
      height: 210px;
      margin-top: 12px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 14px;
      color: #344054;
      background: var(--soft);
      outline: none;
      font-size: 13px;
      line-height: 1.55;
    }

    .restart-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 780px) {
      .page {
        padding: 12px 10px 28px;
      }

      .hero,
      .app-card,
      .result-card,
      .support-card {
        border-radius: 22px;
      }

      .progress-wrap {
        padding: 18px 18px 0;
      }

      .content {
        padding: 22px 18px 26px;
      }

      .choice-grid,
      .choice-grid.two,
      .result-layout {
        grid-template-columns: 1fr;
      }

      .choice-card {
        min-height: auto;
      }

      .nav-row {
        align-items: stretch;
        flex-direction: column;
      }

      .nav-left,
      .nav-right {
        width: 100%;
      }

      .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <section class="hero">
        <p class="eyebrow">Jon Purchase Engine</p>
        <h1>What should Jon buy?</h1>
        <p class="hero-copy">A guided decision tool for cars, skis, and bikes. Answer a few questions, then get a recommendation at the end.</p>
      </section>

      <section class="app-card">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="stepCounter">Step 1 of 5</span>
            <span id="stepLabel">Category</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="content" id="quizContent"></div>
      </section>
    </div>
  </main>

  <script>
    const CATEGORY_DATA = {
      car: {
        label: "Car",
        icon: "🚙",
        useCases: [
          { id: "daily", label: "Daily driver", desc: "Most miles are normal life miles." },
          { id: "family", label: "Family hauler", desc: "People, dogs, gear, and errands." },
          { id: "winter", label: "Ski / winter access", desc: "Bad weather confidence matters." },
          { id: "roadtrip", label: "Road trips", desc: "Comfort and cargo over long distances." },
          { id: "forever", label: "Keep it forever", desc: "Long-term durability matters most." }
        ],
        priorities: ["Reliability", "Capability", "Comfort", "Cargo space", "Resale value", "Low regret"],
        options: [
          {
            name: "Toyota Land Cruiser",
            lane: "Long-term utility pick",
            description: "The strongest fit when the purchase is judged on durability, confidence, utility, resale logic, and long-term satisfaction instead of short-term price alone.",
            strengths: ["Built for long ownership", "Strong winter and adventure confidence", "Excellent utility and resale logic", "More likely to end the shopping loop"],
            caveats: ["Higher purchase price", "Worse fuel economy than softer alternatives", "More vehicle than strictly necessary for basic commuting"]
          },
          {
            name: "Subaru Outback",
            lane: "Practical benchmark",
            description: "A useful control option for cost, efficiency, and easy daily living, but less compelling if the goal is a long-term, buy-once vehicle.",
            strengths: ["Lower entry cost", "Good snow utility", "Easy to live with"],
            caveats: ["Less durable/adventure-oriented", "Lower emotional staying power", "May restart the decision later"]
          }
        ]
      },
      skis: {
        label: "Skis",
        icon: "🎿",
        useCases: [
          { id: "powder", label: "Powder days", desc: "Soft snow is the point." },
          { id: "resort", label: "Resort laps", desc: "Mostly lift-served skiing." },
          { id: "trees", label: "Trees and playful lines", desc: "Quick pivots and fun matter." },
          { id: "touring", label: "Touring", desc: "Weight and uphill use matter." },
          { id: "mixed", label: "Mixed soft conditions", desc: "Needs to work beyond perfect days." }
        ],
        priorities: ["Float", "Playfulness", "Stability", "Touring weight", "Versatility", "Fun factor"],
        options: [
          {
            name: "Rossignol Black Ops 118",
            lane: "Soft-snow resort pick",
            description: "The better fit when Jon is prioritizing float, lift-served powder days, soft chop, and a ski that feels genuinely fun when conditions are good.",
            strengths: ["Best powder bias", "Strong resort soft-snow logic", "Confidence in chop and deeper days", "Feels like a true special-day ski"],
            caveats: ["Wide for firm days", "Not the touring-oriented pick", "Less versatile than a narrower ski"]
          },
          {
            name: "Moment Wildcat Tour 108",
            lane: "Touring / versatile soft-snow pick",
            description: "The better fit when Jon wants a playful soft-snow ski that can tour, travel, and handle more mixed conditions without going all the way to a 118mm resort powder ski.",
            strengths: ["More versatile width", "Better touring logic", "Still playful and soft-snow oriented", "Easier to justify for frequent use"],
            caveats: ["Less float than a 118", "Tour build may not be ideal for resort abuse", "Still not a firm-snow daily driver"]
          }
        ]
      },
      bike: {
        label: "Bike",
        icon: "🚲",
        useCases: [
          { id: "gravel", label: "Gravel", desc: "Dirt roads and mixed surfaces." },
          { id: "road", label: "Road fitness", desc: "Pavement speed and group rides." },
          { id: "bikepacking", label: "Bikepacking", desc: "Longer rides and carrying gear." },
          { id: "trail", label: "XC / light trail", desc: "Singletrack is part of the plan." },
          { id: "dream", label: "Dream bike", desc: "A long-term keeper matters." }
        ],
        priorities: ["Ride quality", "Durability", "Craftsmanship", "Comfort", "Performance", "Timeless design"],
        options: [
          {
            name: "Moots Routt family",
            lane: "Gravel / all-road pick",
            description: "The best fit if Jon wants one premium titanium bike for gravel, all-road riding, long days, and a high use rate across mixed terrain.",
            strengths: ["Most versatile Moots lane", "Strong long-ride logic", "High use-rate potential", "Feels like a forever bike"],
            caveats: ["Premium price", "Build spec matters", "Not a true mountain bike"]
          },
          {
            name: "Moots Vamoots family",
            lane: "Road pick",
            description: "The best fit if Jon mainly wants pavement speed, road fitness, group rides, and a refined titanium bike that will still feel special years from now.",
            strengths: ["Clean road-bike identity", "Fast and timeless", "Comfortable for big miles", "Easy to love long-term"],
            caveats: ["Less useful off pavement", "Narrower use case", "Still needs the right build"]
          },
          {
            name: "Moots Womble / MXC / Mountaineer lane",
            lane: "Mountain pick",
            description: "The best fit if the actual use case is singletrack, XC, light trail riding, or a titanium mountain bike that stays cool forever.",
            strengths: ["Best match for trail use", "Clearly distinct from a gravel bike", "Durable and special", "Strong enthusiast appeal"],
            caveats: ["More maintenance", "Requires regular trail access", "Must match local terrain"]
          }
        ]
      }
    };

    const STEPS = [
      { key: "category", label: "Category" },
      { key: "use", label: "Use case" },
      { key: "priorities", label: "Priorities" },
      { key: "style", label: "Decision style" },
      { key: "alternative", label: "Reality check" },
      { key: "result", label: "Recommendation" }
    ];

    const STYLE_OPTIONS = [
      { id: "practical", label: "Practical", desc: "Minimize regret, hassle, and wasted money." },
      { id: "balanced", label: "Balanced", desc: "Let the fun answer win only if it is defensible." },
      { id: "enthusiast", label: "Enthusiast", desc: "Prioritize the option he will still be excited about later." }
    ];

    const state = {
      step: 0,
      category: null,
      useCases: [],
      priorities: [],
      style: null,
      alternative: ""
    };

    const quizContent = document.getElementById("quizContent");
    const stepCounter = document.getElementById("stepCounter");
    const stepLabel = document.getElementById("stepLabel");
    const progressBar = document.getElementById("progressBar");

    function selectedData() {
      return state.category ? CATEGORY_DATA[state.category] : null;
    }

    function resetAfterCategoryChange() {
      state.useCases = [];
      state.priorities = [];
      state.style = null;
      state.alternative = "";
    }

    function goToStep(step) {
      state.step = Math.max(0, Math.min(STEPS.length - 1, step));
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function canContinue() {
      const current = STEPS[state.step].key;
      if (current === "category") return Boolean(state.category);
      if (current === "use") return state.useCases.length > 0;
      if (current === "priorities") return state.priorities.length > 0;
      if (current === "style") return Boolean(state.style);
      return true;
    }

    function toggleMulti(collectionName, value, max) {
      const collection = state[collectionName];
      const index = collection.indexOf(value);
      if (index >= 0) {
        collection.splice(index, 1);
      } else if (collection.length < max) {
        collection.push(value);
      }
      render();
    }

    function scoreOptions() {
      const data = selectedData();
      const combined = `${state.useCases.join(" ")} ${state.priorities.join(" ")} ${state.style || ""}`.toLowerCase();

      return data.options.map((option) => {
        const text = `${option.name} ${option.lane} ${option.description}`.toLowerCase();
        let score = 62;

        if (state.category === "car" && option.name.includes("Land Cruiser")) score += 26;
        if (state.category === "car" && option.name.includes("Outback")) score += 4;
        if (state.category === "car" && /forever|winter|capability|durability|reliability|resale|low regret|roadtrip|family/.test(combined) && option.name.includes("Land Cruiser")) score += 11;

        if (state.category === "skis" && option.name.includes("Black Ops") && /powder|resort|float|stability|fun|chop/.test(combined)) score += 20;
        if (state.category === "skis" && option.name.includes("Wildcat") && /touring|mixed|versatility|travel|weight|playfulness|trees/.test(combined)) score += 20;
        if (state.category === "skis" && state.useCases.length === 0 && option.name.includes("Wildcat")) score += 2;

        if (state.category === "bike" && option.name.includes("Routt") && /gravel|bikepacking|comfort|ride quality|dream|durability|timeless/.test(combined)) score += 20;
        if (state.category === "bike" && option.name.includes("Vamoots") && /road|fitness|performance/.test(combined)) score += 20;
        if (state.category === "bike" && /Womble|MXC|Mountaineer/.test(option.name) && /trail|xc/.test(combined)) score += 20;

        if (state.style === "practical" && /durability|resale|versatile|comfort|long|low regret|utility/.test(`${combined} ${text}`)) score += 5;
        if (state.style === "balanced") score += 6;
        if (state.style === "enthusiast" && /fun|special|forever|dream|moots|land cruiser|powder|playful/.test(`${combined} ${text}`)) score += 7;

        return {
          ...option,
          score: Math.max(0, Math.min(97, Math.round(score)))
        };
      }).sort((a, b) => b.score - a.score);
    }

    function createChoiceCard({ title, desc, emoji, selected, onClick }) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `choice-card${selected ? " selected" : ""}`;
      button.innerHTML = `
        <div class="choice-emoji">${emoji || ""}</div>
        <div class="choice-title">${title}</div>
        ${desc ? `<div class="choice-desc">${desc}</div>` : ""}
      `;
      button.addEventListener("click", onClick);
      return button;
    }

    function createPill(label, selected, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `pill${selected ? " selected" : ""}`;
      button.textContent = label;
      button.addEventListener("click", onClick);
      return button;
    }

    function renderNav() {
      const nav = document.createElement("div");
      nav.className = "nav-row";

      const left = document.createElement("div");
      left.className = "nav-left";

      const right = document.createElement("div");
      right.className = "nav-right";

      if (state.step > 0) {
        const back = document.createElement("button");
        back.type = "button";
        back.className = "btn btn-secondary";
        back.textContent = "Back";
        back.addEventListener("click", () => goToStep(state.step - 1));
        left.appendChild(back);
      }

      const restart = document.createElement("button");
      restart.type = "button";
      restart.className = "btn btn-secondary";
      restart.textContent = "Start over";
      restart.addEventListener("click", () => {
        state.step = 0;
        state.category = null;
        resetAfterCategoryChange();
        render();
      });
      left.appendChild(restart);

      if (state.step < STEPS.length - 2) {
        const next = document.createElement("button");
        next.type = "button";
        next.className = "btn btn-primary";
        next.textContent = "Next";
        next.disabled = !canContinue();
        next.addEventListener("click", () => goToStep(state.step + 1));
        right.appendChild(next);
      } else if (state.step === STEPS.length - 2) {
        const result = document.createElement("button");
        result.type = "button";
        result.className = "btn btn-primary";
        result.textContent = "See recommendation";
        result.disabled = !canContinue();
        result.addEventListener("click", () => goToStep(STEPS.length - 1));
        right.appendChild(result);
      }

      nav.appendChild(left);
      nav.appendChild(right);
      return nav;
    }

    function renderCategoryStep() {
      quizContent.innerHTML = "";
      quizContent.insertAdjacentHTML("beforeend", `
        <h2 class="step-title">What is Jon buying?</h2>
        <p class="step-subtitle">Start with the category. The tool will adjust the questions from there.</p>
      `);

      const grid = document.createElement("div");
      grid.className = "choice-grid";

      Object.entries(CATEGORY_DATA).forEach(([key, value]) => {
        grid.appendChild(createChoiceCard({
          title: value.label,
          desc: key === "car" ? "Daily use, trips, weather, and ownership math." : key === "skis" ? "Snow conditions, terrain, and how often they will get used." : "Terrain, ride style, fit, and long-term ownership.",
          emoji: value.icon,
          selected: state.category === key,
          onClick: () => {
            if (state.category !== key) {
              state.category = key;
              resetAfterCategoryChange();
            }
            render();
          }
        }));
      });

      quizContent.appendChild(grid);
      quizContent.appendChild(renderNav());
    }

    function renderUseStep() {
      const data = selectedData();
      quizContent.innerHTML = "";
      quizContent.insertAdjacentHTML("beforeend", `
        <h2 class="step-title">How will he actually use it?</h2>
        <p class="step-subtitle">Pick up to two. This keeps the recommendation tied to real use instead of imaginary perfect conditions.</p>
      `);

      const grid = document.createElement("div");
      grid.className = "choice-grid";
      data.useCases.forEach((item) => {
        grid.appendChild(createChoiceCard({
          title: item.label,
          desc: item.desc,
          emoji: "",
          selected: state.useCases.includes(item.id),
          onClick: () => toggleMulti("useCases", item.id, 2)
        }));
      });
      quizContent.appendChild(grid);

      if (state.useCases.length >= 2) {
        const hint = document.createElement("p");
        hint.className = "hint";
        hint.textContent = "Two selected. Unselect one to choose a different use case.";
        quizContent.appendChild(hint);
      }

      quizContent.appendChild(renderNav());
    }

    function renderPrioritiesStep() {
      const data = selectedData();
      quizContent.innerHTML = "";
      quizContent.insertAdjacentHTML("beforeend", `
        <h2 class="step-title">What matters most?</h2>
        <p class="step-subtitle">Pick up to three priorities. This is the practical filter.</p>
      `);

      const pills = document.createElement("div");
      pills.className = "pill-grid";
      data.priorities.forEach((priority) => {
        pills.appendChild(createPill(priority, state.priorities.includes(priority), () => toggleMulti("priorities", priority, 3)));
      });
      quizContent.appendChild(pills);

      if (state.priorities.length >= 3) {
        const hint = document.createElement("p");
        hint.className = "hint";
        hint.textContent = "Three selected. Unselect one to change the weighting.";
        quizContent.appendChild(hint);
      }

      quizContent.appendChild(renderNav());
    }

    function renderStyleStep() {
      quizContent.innerHTML = "";
      quizContent.insertAdjacentHTML("beforeend", `
        <h2 class="step-title">What kind of decision is this?</h2>
        <p class="step-subtitle">Choose the lens Jon is using. This changes how the same facts get weighted.</p>
      `);

      const grid = document.createElement("div");
      grid.className = "choice-grid";
      STYLE_OPTIONS.forEach((option) => {
        grid.appendChild(createChoiceCard({
          title: option.label,
          desc: option.desc,
          emoji: option.id === "practical" ? "📋" : option.id === "balanced" ? "⚖️" : "⚡",
          selected: state.style === option.id,
          onClick: () => {
            state.style = option.id;
            render();
          }
        }));
      });
      quizContent.appendChild(grid);
      quizContent.appendChild(renderNav());
    }

    function renderAlternativeStep() {
      quizContent.innerHTML = "";
      quizContent.insertAdjacentHTML("beforeend", `
        <h2 class="step-title">What is the current contender?</h2>
        <p class="step-subtitle">Optional, but useful. Add whatever Jon is currently comparing against.</p>
        <div class="input-wrap">
          <label class="input-label" for="alternativeInput">Current alternative</label>
          <input id="alternativeInput" placeholder="Example: Subaru Outback, QST 98, used gravel bike..." value="${escapeHtml(state.alternative)}" />
        </div>
      `);

      const input = document.getElementById("alternativeInput");
      input.addEventListener("input", (event) => {
        state.alternative = event.target.value;
      });

      quizContent.appendChild(renderNav());
    }

    function renderResultStep() {
      const data = selectedData();
      const results = scoreOptions();
      const winner = results[0];
      const runnerUp = results[1];
      const useLabels = state.useCases.map((id) => data.useCases.find((item) => item.id === id)?.label).filter(Boolean);

      const brief = [
        `Category: ${data.label}`,
        `Recommendation: ${winner.name}`,
        `Fit score: ${winner.score}%`,
        useLabels.length ? `Primary use: ${useLabels.join(", ")}` : null,
        state.priorities.length ? `Priorities: ${state.priorities.join(", ")}` : null,
        state.style ? `Decision lens: ${STYLE_OPTIONS.find((item) => item.id === state.style)?.label}` : null,
        state.alternative ? `Current alternative: ${state.alternative}` : null,
        runnerUp ? `Compare against: ${runnerUp.name}` : null,
        `Rationale: ${winner.description}`
      ].filter(Boolean).join("\n");

      quizContent.innerHTML = `
        <h2 class="step-title">Recommendation</h2>
        <p class="step-subtitle">Based on the answers, this is the strongest fit.</p>
        <div class="result-layout">
          <div class="result-card">
            <div class="result-label">Highest-fit option</div>
            <h3 class="result-name">${winner.name}</h3>
            <div class="confidence">${winner.lane} · ${winner.score}% fit</div>
            <p class="result-copy">${winner.description}</p>
            <div class="result-section">
              <div class="result-section-title">Why this works</div>
              <ul>${winner.strengths.map((item) => `<li>${item}</li>`).join("")}</ul>
            </div>
            <div class="result-section">
              <div class="result-section-title">Tradeoffs to acknowledge</div>
              <ul>${winner.caveats.map((item) => `<li>${item}</li>`).join("")}</ul>
            </div>
          </div>
          <div class="support-card">
            <h3 class="support-title">Pressure test</h3>
            <div class="compare-box">
              <div class="compare-name">${runnerUp ? runnerUp.name : "No close second"}</div>
              <div class="compare-meta">${runnerUp ? runnerUp.lane : ""}</div>
              <p class="compare-copy">${runnerUp ? runnerUp.description : "The selected answers point strongly to one option."}</p>
            </div>
            ${state.alternative ? `
              <div class="compare-box">
                <div class="compare-name">Current contender</div>
                <div class="compare-meta">${escapeHtml(state.alternative)}</div>
                <p class="compare-copy">Use this as the real-world comparison. If it mostly wins on being cheaper or easier to justify, check whether it will still feel like the right answer in two years.</p>
              </div>
            ` : ""}
            <div class="input-label" style="margin-top: 18px;">Buyer brief</div>
            <textarea readonly>${escapeHtml(brief)}</textarea>
            <div class="restart-row">
              <button type="button" class="btn btn-secondary" onclick="goToStep(0)">Start over</button>
              <button type="button" class="btn btn-primary" onclick="goToStep(1)">Change answers</button>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderProgress() {
      const step = STEPS[state.step];
      stepCounter.textContent = `Step ${Math.min(state.step + 1, STEPS.length)} of ${STEPS.length}`;
      stepLabel.textContent = step.label;
      progressBar.style.width = `${((state.step + 1) / STEPS.length) * 100}%`;
    }

    function render() {
      renderProgress();
      const current = STEPS[state.step].key;

      if (current === "category") renderCategoryStep();
      if (current === "use") renderUseStep();
      if (current === "priorities") renderPrioritiesStep();
      if (current === "style") renderStyleStep();
      if (current === "alternative") renderAlternativeStep();
      if (current === "result") renderResultStep();
    }

    render();
  </script>
</body>
</html>
